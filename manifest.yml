function:
  name: ProcessMappingAgentFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: >
    Agente multicanal para entrevistar miembros de la organizacion por email
    o WhatsApp, refinar el canvas de un proceso y completar su perfil de usuario.
  timeout: 300
  memory_size: 1024
  type: agent
  llm_sockets:
    - name: process_mapping_agent
      description: "Main LLM context for process mapping email and WhatsApp conversations"
      required: true
  layers:
    - foundationMinimal
    - foundationApi
  parameters:
    required: []
    optional: []
  widget:
    enabled: false
